name: Deploy to Azure

on:
    push:
        branches: [main]

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "8.0.x"

            - name: Build and Test
              run: |
                  dotnet build KanbanAPI/KanbanAPI.csproj
                  dotnet test KanbanAPI.Tests/KanbanAPI.Tests.csproj

            - name: Publish
              run: dotnet publish KanbanAPI/KanbanAPI.csproj -c Release -o ./publish

            - name: Deploy to Azure
              uses: azure/webapps-deploy@v2
              with:
                  app-name: "my-kanban-board-api"
                  publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
                  package: ./publish
